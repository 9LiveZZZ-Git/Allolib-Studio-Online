<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AlloLib Studio Online</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script>
      // GitHub Pages SPA redirect: decode the path that 404.html encoded as ?p=
      (function () {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
          return;
        }
        // Also handle the ?p= query param set by 404.html
        var search = location.search;
        if (search && search.indexOf('?p=') === 0) {
          var decoded = decodeURIComponent(search.slice(3));
          history.replaceState(null, null, '/' + decoded);
        }
      })();
    </script>
  </head>
  <body class="bg-editor-bg text-white overflow-hidden">
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
